<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indicadores Gerais · HUB COMLURB</title>

<link rel="stylesheet" href="../assets/css/hub-premium.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>
<div class="app">

  <div class="header">

<script>
/* ============================================================
   Tudo embutido nesta página (registro de indicadores + o
   componente real HUB.cards que você me passou) pra eliminar
   qualquer problema de caminho de arquivo nesta rodada de teste.
   Quando estiver validado, dá pra voltar a carregar
   assets/js/indicadores-registro.js e o hub-cards.js de verdade
   via <script src>, em vez de deixar duplicado aqui.
   ============================================================ */

window.HUB = window.HUB || {};

// shim mínimo, só entra em ação se hub-utils.js não estiver carregado nesta página
HUB.dom = HUB.dom || { $: function (id) { return document.getElementById(id); } };
HUB.format = HUB.format || {};
HUB.format.esc = HUB.format.esc || function (s) {
  return String(s).replace(/[&<>"']/g, function (c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
};

/* ---------------- HUB.indicadores (registro de eixos) ---------------- */

    { indicador: 'Solicitações 1746 - Remoção de Árvore', eixo: 'Atendimento', exibicao: 'drill', cardPai: 'Solicitações 1746', tipoServico: 'Remoção de Árvore' },
    { indicador: 'Solicitações 1746 - Remoção de Resíduos', eixo: 'Atendimento', exibicao: 'drill', cardPai: 'Solicitações 1746', tipoServico: 'Remoção de Resíduos' },
    { indicador: 'Solicitações 1746 - Remoção Gratuita', eixo: 'Atendimento', exibicao: 'drill', cardPai: 'Solicitações 1746', tipoServico: 'Remoção Gratuita' },

    { indicador: 'Solicitações Ouvidoria - Capina', eixo: 'Atendimento', exibicao: 'drill', cardPai: 'Solicitações Ouvidoria', tipoServico: 'Capina' },
    { indicador: 'Solicitações Ouvidoria - Coleta', eixo: 'Atendimento', exibicao: 'drill', cardPai: 'Solicitações Ouvidoria', tipoServico: 'Coleta' },
    { indicador: 'Solicitações Ouvidoria - Destoca de Toco e Raiz', eixo: 'Atendimento', exibicao: 'drill', cardPai: 'Solicitações Ouvidoria', tipoServico: 'Destoca de Toco e Raiz' },
    { indicador: 'Solicitações Ouvidoria - Limpeza de Ralos', eixo: 'Atendimento', exibicao: 'drill', cardPai: 'Solicitações Ouvidoria', tipoServico: 'Limpeza de Ralos' },
    { indicador: 'Solicitações Ouvidoria - Poda de Árvore', eixo: 'Atendimento', exibicao: 'drill', cardPai: 'Solicitações Ouvidoria', tipoServico: 'Poda de Árvore' },
    { indicador: 'Solicitações Ouvidoria - Praças', eixo: 'Atendimento', exibicao: 'drill', cardPai: 'Solicitações Ouvidoria', tipoServico: 'Praças' },
    { indicador: 'Solicitações Ouvidoria - Remoção de Árvore', eixo: 'Atendimento', exibicao: 'drill', cardPai: 'Solicitações Ouvidoria', tipoServico: 'Remoção de Árvore' },
    { indicador: 'Solicitações Ouvidoria - Remoção de Resíduos', eixo: 'Atendimento', exibicao: 'drill', cardPai: 'Solicitações Ouvidoria', tipoServico: 'Remoção de Resíduos' },
    { indicador: 'Solicitações Ouvidoria - Remoção Gratuita', eixo: 'Atendimento', exibicao: 'drill', cardPai: 'Solicitações Ouvidoria', tipoServico: 'Remoção Gratuita' },
    { indicador: 'Solicitações Ouvidoria - Risco de Queda', eixo: 'Atendimento', exibicao: 'drill', cardPai: 'Solicitações Ouvidoria', tipoServico: 'Risco de Queda' },
    { indicador: 'Solicitações Ouvidoria - Varrição', eixo: 'Atendimento', exibicao: 'drill', cardPai: 'Solicitações Ouvidoria', tipoServico: 'Varrição' },
    { indicador: 'Solicitações Ouvidoria - Vetores', eixo: 'Atendimento', exibicao: 'drill', cardPai: 'Solicitações Ouvidoria', tipoServico: 'Vetores' }

  ];

  function porIndicador(nome) { return REGISTRO.find(function (r) { return r.indicador === nome; }); }
  function porEixo(eixo) { return REGISTRO.filter(function (r) { return r.eixo === eixo; }); }
  function cardsDoEixo(eixo) { return REGISTRO.filter(function (r) { return r.eixo === eixo && r.exibicao === 'card'; }); }
  function drillsDoCard(nomeCardPai) { return REGISTRO.filter(function (r) { return r.cardPai === nomeCardPai; }); }
  function getEixo(nome) { const r = porIndicador(nome); return r ? r.eixo : null; }
  function ehCard(nome) { const r = porIndicador(nome); return r ? r.exibicao === 'card' : false; }
  function listaIndicadoresValidos() { return REGISTRO.map(function (r) { return r.indicador; }); }

  return {
    EIXOS: EIXOS, REGISTRO: REGISTRO, porIndicador: porIndicador, porEixo: porEixo,
    cardsDoEixo: cardsDoEixo, drillsDoCard: drillsDoCard, getEixo: getEixo,
    ehCard: ehCard, listaIndicadoresValidos: listaIndicadoresValidos
  };

})();

/* ---------------- HUB.cards (componente real, igual ao seu hub-cards.js) ---------------- */

HUB.cards = {
  render(containerId, kpis) {
    const container = HUB.dom.$(containerId);
    if (!container) {
      console.warn(`Container ${containerId} não encontrado`);
      return;
    }
    container.innerHTML = kpis.map(kpi => this._renderCard(kpi)).join("");
  },

  _renderCard(kpi) {
    const {
      label, value, note = "", color = "", feature = false, onclick = "",
      format = "int", customFormatter = null, tooltip = ""
    } = kpi;

    let formattedValue;
    if (customFormatter) {
      formattedValue = customFormatter(value);
    } else if (format === "pct") {
      formattedValue = HUB.format.pct(value);
    } else {
      formattedValue = HUB.format.int(value);
    }

    const classes = ["kpi", feature ? "feature" : "", color ? color : ""].filter(Boolean).join(" ");

    const attrs = [
      onclick ? `onclick="${onclick}"` : "",
      onclick ? 'style="cursor:pointer"' : "",
      tooltip ? `data-tooltip="${HUB.format.esc(tooltip)}"` : ""
    ].filter(Boolean).join(" ");

    return `
      <div class="${classes}" ${attrs}>
        <div class="label">${HUB.format.esc(label)}</div>
        <div class="value">${formattedValue}</div>
        ${note ? `<div class="note">${HUB.format.esc(note)}</div>` : ""}
      </div>
    `;
  },

  update(containerId, updates) {
    const container = HUB.dom.$(containerId);
    if (!container) return;
    Object.entries(updates).forEach(([label, value]) => {
      const card = [...container.querySelectorAll(".kpi")].find(
        el => el.querySelector(".label")?.textContent === label
      );
      if (card) {
        const valueEl = card.querySelector(".value");
        if (valueEl) valueEl.textContent = HUB.format.int(value);
      }
    });
  }
};

/* ---------------- lógica desta página ---------------- */

(function () {

  const CONFIG = {
    csvUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQphrIIjiY4aWBONgByLezMnFk8YbyYpF-vtgxOLoV8-85_WUVAXH_f_Ahy8ymxmgnGXmQ_KiFSOkIK/pub?gid=1044100274&single=true&output=csv',
    diretoriaDefault: 'COMLURB',
    limiteAtencao: 0.10 // desvio percentual da meta até virar "crítico". É um rascunho, ajustar com a Greicy.
  };

  const MESES = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];

  const IDS_EIXO = {
    'Pessoas': 'grid-pessoas',
    'Segurança': 'grid-seguranca',
    'Operação': 'grid-operacao',
    'Atendimento': 'grid-atendimento',
    'Sustentabilidade': 'grid-sustentabilidade',
    'Receita': 'grid-receita'
  };

  let DATA = [];
  let anoSelecionado = null;
  let diretoriaSelecionada = CONFIG.diretoriaDefault;

  function parseNumeroBR(v) {
    if (v === undefined || v === null) return null;
    const s = String(v).trim();
    if (s === '' || s === '-') return null;
    const n = parseFloat(s.replace(',', '.'));
    return isNaN(n) ? null : n;
  }

  function linhaCorporativa(indicador, diretoria, ano) {
    return DATA.find(function (r) {
      return r.Indicador === indicador &&
        r.Diretoria === diretoria &&
        r['Superint.'] === '-' &&
        r['Gerência'] === '-' &&
        String(r.Ano) === String(ano);
    });
  }

  function calcularStatus(valor, meta, sentido) {
    if (valor === null) return { cor: '', label: 'sem dado' };
    if (meta === null) return { cor: '', label: 'sem meta definida' };
    const atingiu = sentido === '↑' ? valor >= meta : valor <= meta;
    if (atingiu) return { cor: 'green', label: 'dentro da meta' };
    if (meta === 0) return { cor: 'red', label: 'crítico' };
    const desvio = sentido === '↑' ? (meta - valor) / Math.abs(meta) : (valor - meta) / Math.abs(meta);
    if (desvio <= CONFIG.limiteAtencao) return { cor: 'orange', label: 'atenção' };
    return { cor: 'red', label: 'crítico' };
  }

  function montarKpi(indicadorNome) {
    const row = linhaCorporativa(indicadorNome, diretoriaSelecionada, anoSelecionado);

    if (!row) {
      return {
        label: indicadorNome, value: null, note: 'sem dado para esse recorte',
        format: 'custom', customFormatter: function () { return '—'; }
      };
    }

    const acumulado = parseNumeroBR(row.Acumulado);
    const meta = parseNumeroBR(row.Meta);
    const sentido = row.Sentido;
    const unidade = row.Unidade || '';
    const status = calcularStatus(acumulado, meta, sentido);

    const nota = (meta !== null ? 'meta ' + meta.toLocaleString('pt-BR') + unidade + ' · ' : 'sem meta definida · ') + status.label;

    return {
      label: indicadorNome,
      value: acumulado,
      note: nota,
      color: status.cor,
      format: 'custom',
      customFormatter: function (v) { return v === null ? '—' : v.toLocaleString('pt-BR') + unidade; }
    };
  }

  function renderEixo(eixo) {
    const cards = HUB.indicadores.cardsDoEixo(eixo);
    const gridId = IDS_EIXO[eixo];

    const panel = document.createElement('div');
    panel.className = 'panel';
    panel.style.marginBottom = '24px';
    panel.innerHTML =
      '<div class="panelHead"><h2>' + eixo + '</h2><span class="hint">' + cards.length + ' indicadores</span></div>' +
      '<div class="body"><div class="grid" id="' + gridId + '"></div></div>';

    document.getElementById('conteudo').appendChild(panel);

    const kpis = cards.map(function (c) { return montarKpi(c.indicador); });
    HUB.cards.render(gridId, kpis);
  }

  function render() {
    const conteudo = document.getElementById('conteudo');
    conteudo.innerHTML = '';
    HUB.indicadores.EIXOS.forEach(renderEixo);
  }

  function popularFiltros() {
    const anos = Array.from(new Set(DATA.map(function (r) { return r.Ano; }))).sort();
    const selAno = document.getElementById('filtroAno');
    selAno.innerHTML = anos.map(function (a) { return '<option value="' + a + '">' + a + '</option>'; }).join('');
    anoSelecionado = anos[anos.length - 1];
    selAno.value = anoSelecionado;
    selAno.onchange = function () { anoSelecionado = this.value; render(); };

    const diretorias = Array.from(new Set(
      DATA.filter(function (r) { return r['Superint.'] === '-' && r['Gerência'] === '-'; })
        .map(function (r) { return r.Diretoria; })
    )).sort();
    const selDir = document.getElementById('filtroDiretoria');
    selDir.innerHTML = diretorias.map(function (d) { return '<option value="' + d + '">' + d + '</option>'; }).join('');
    if (diretorias.indexOf(diretoriaSelecionada) === -1) diretoriaSelecionada = diretorias[0];
    selDir.value = diretoriaSelecionada;
    selDir.onchange = function () { diretoriaSelecionada = this.value; render(); };
  }

  function init() {
    Papa.parse(CONFIG.csvUrl, {
      download: true,
      header: true,
      complete: function (results) {
        DATA = results.data.filter(function (r) { return r.Indicador; });
        document.getElementById('loading').style.display = 'none';
        document.getElementById('conteudo').style.display = 'block';
        document.getElementById('footerTimestamp').textContent = 'Atualizado em ' + new Date().toLocaleString('pt-BR');
        popularFiltros();
        render();
      },
      error: function () {
        document.getElementById('loading').style.display = 'none';
        const el = document.getElementById('errorState');
        el.style.display = 'block';
        el.textContent = 'Não foi possível carregar os dados da planilha. Verifique se o CSV ainda está publicado (Arquivo > Compartilhar > Publicar na Web).';
      }
    });
  }

  init();

})();
</script>
