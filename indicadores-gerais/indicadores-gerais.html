<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indicadores Gerais · HUB COMLURB</title>

<link rel="stylesheet" href="../assets/css/hub-premium.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="../assets/components/hub-utils.js"></script>
<script src="../assets/components/hub-cards.js"></script>
<script src="../assets/js/indicadores-registro.js"></script>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logoWrap">
      <!-- troca por <img class="logoImg" src="../assets/logos/SEU-ARQUIVO.png" alt="COMLURB"> quando me passar o nome do arquivo -->
      <div class="logoTextFallback">COMLURB</div>
    </div>
    <div class="headerContent">
      <div class="systemLabel">HUB COMLURB</div>
      <h1 class="mainTitle">Indicadores Gerais</h1>
      <div class="subtitle">Gabinete da Presidência · Núcleo de Inteligência e Gestão Estratégica Operacional</div>
    </div>
  </div>

  <div class="filters">
    <div class="field">
      <label for="filtroAno">Ano</label>
      <select id="filtroAno"></select>
    </div>
    <div class="field">
      <label for="filtroDiretoria">Diretoria</label>
      <select id="filtroDiretoria"></select>
    </div>
  </div>

  <div id="loading" class="loading">Carregando dados...</div>
  <div id="errorState" class="empty" style="display:none; color:var(--vermelho)"></div>
  <div id="conteudo" style="display:none"></div>

  <div class="footer">
    <div class="footerContent">
      Gabinete da Presidência / HUB COMLURB • Núcleo de Inteligência e Gestão Estratégica Operacional<br>
      Greicy Moreira
      <div class="footerTimestamp" id="footerTimestamp"></div>
    </div>
  </div>

</div>

<script>
(function () {

  // shim mínimo, só entra em ação se hub-utils.js falhar ao carregar
  window.HUB = window.HUB || {};
  HUB.dom = HUB.dom || { $: function (id) { return document.getElementById(id); } };
  HUB.format = HUB.format || {};
  HUB.format.esc = HUB.format.esc || function (s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  };

  const CONFIG = {
    csvUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQphrIIjiY4aWBONgByLezMnFk8YbyYpF-vtgxOLoV8-85_WUVAXH_f_Ahy8ymxmgnGXmQ_KiFSOkIK/pub?gid=1044100274&single=true&output=csv',
    diretoriaDefault: 'COMLURB',
    limiteAtencao: 0.10 // desvio percentual da meta até virar "crítico". É um rascunho, ajustar com a Greicy.
  };

  const IDS_EIXO = {
    'Pessoas': 'grid-pessoas',
    'Segurança': 'grid-seguranca',
    'Operação': 'grid-operacao',
    'Atendimento': 'grid-atendimento',
    'Sustentabilidade': 'grid-sustentabilidade',
    'Receita': 'grid-receita'
  };

  const PRIORIDADE_STATUS = { red: 0, orange: 1, green: 2, '': 3 };

  let DATA = [];
  let anoSelecionado = null;
  let diretoriaSelecionada = CONFIG.diretoriaDefault;

  function montarKpi(registroEntry) {
    const av = HUB.indicadores.avaliarIndicador(DATA, registroEntry.indicador, diretoriaSelecionada, anoSelecionado, CONFIG.limiteAtencao);

    if (!av.row) {
      return {
        eixo: registroEntry.eixo, label: registroEntry.indicador, value: null, color: '',
        note: 'sem dado para esse recorte', format: 'custom', customFormatter: function () { return '—'; }
      };
    }

    const partesNota = [];
    if (av.meta !== null && av.acumulado !== null) {
      const sinal = av.delta > 0 ? '+' : '';
      partesNota.push('meta ' + av.meta.toLocaleString('pt-BR') + av.unidade);
      partesNota.push('Δ ' + sinal + av.delta.toLocaleString('pt-BR', { maximumFractionDigits: 1 }) + av.unidade);
      if (av.tendencia) partesNota.push(av.tendencia.simbolo + ' ' + av.tendencia.texto + (av.tendencia.ciclos > 1 ? ' há ' + av.tendencia.ciclos + ' ciclos' : ''));
      partesNota.push(av.status.label);
    } else {
      partesNota.push('sem meta definida');
      if (av.tendencia) partesNota.push(av.tendencia.simbolo + ' ' + av.tendencia.texto + (av.tendencia.ciclos > 1 ? ' há ' + av.tendencia.ciclos + ' ciclos' : ''));
    }

    return {
      eixo: registroEntry.eixo,
      label: registroEntry.indicador,
      value: av.acumulado,
      note: partesNota.join(' · '),
      color: av.status.cor,
      format: 'custom',
      customFormatter: function (v) { return v === null ? '—' : v.toLocaleString('pt-BR') + av.unidade; }
    };
  }

  function renderResumo(todosKpis) {
    const cont = { green: 0, orange: 0, red: 0, semMeta: 0 };
    todosKpis.forEach(function (k) {
      if (k.color === 'green') cont.green++;
      else if (k.color === 'orange') cont.orange++;
      else if (k.color === 'red') cont.red++;
      else cont.semMeta++;
    });

    const div = document.createElement('div');
    div.className = 'kpis';
    div.id = 'kpis-resumo';
    div.style.marginBottom = '20px';
    document.getElementById('conteudo').appendChild(div);

    HUB.cards.render('kpis-resumo', [
      { label: 'Indicadores monitorados', value: todosKpis.length, feature: true, format: 'custom', customFormatter: function (v) { return String(v); } },
      { label: 'Dentro da meta', value: cont.green, color: 'green', format: 'custom', customFormatter: function (v) { return String(v); } },
      { label: 'Em atenção', value: cont.orange, color: 'orange', format: 'custom', customFormatter: function (v) { return String(v); } },
      { label: 'Críticos', value: cont.red, color: 'red', format: 'custom', customFormatter: function (v) { return String(v); } },
      { label: 'Sem meta ou dado', value: cont.semMeta, format: 'custom', customFormatter: function (v) { return String(v); } }
    ]);
  }

  function renderEixo(eixo, kpisDoEixo) {
    const gridId = IDS_EIXO[eixo];

    const panel = document.createElement('div');
    panel.className = 'panel';
    panel.style.marginBottom = '24px';
    panel.innerHTML =
      '<div class="panelHead"><h2>' + eixo + '</h2><span class="hint">' + kpisDoEixo.length + ' indicadores</span></div>' +
      '<div class="body"><div class="grid" id="' + gridId + '"></div></div>';

    document.getElementById('conteudo').appendChild(panel);
    HUB.cards.render(gridId, kpisDoEixo);
  }

  function render() {
    const conteudo = document.getElementById('conteudo');
    conteudo.innerHTML = '';

    const todosKpis = HUB.indicadores.todosOsCards().map(montarKpi);

    renderResumo(todosKpis);

    HUB.indicadores.EIXOS.forEach(function (eixo) {
      const kpisDoEixo = todosKpis.filter(function (k) { return k.eixo === eixo; });
      kpisDoEixo.sort(function (a, b) { return PRIORIDADE_STATUS[a.color || ''] - PRIORIDADE_STATUS[b.color || '']; });
      renderEixo(eixo, kpisDoEixo);
    });
  }

  function popularFiltros() {
    const anos = Array.from(new Set(DATA.map(function (r) { return r.Ano; }))).sort();
    const selAno = document.getElementById('filtroAno');
    selAno.innerHTML = anos.map(function (a) { return '<option value="' + a + '">' + a + '</option>'; }).join('');
    anoSelecionado = anos[anos.length - 1];
    selAno.value = anoSelecionado;
    selAno.onchange = function () { anoSelecionado = this.value; render(); };

    const diretorias = Array.from(new Set(
      DATA.filter(function (r) { return r['Superint.'] === '-' && r['Gerência'] === '-'; })
        .map(function (r) { return r.Diretoria; })
    )).sort();
    const selDir = document.getElementById('filtroDiretoria');
    selDir.innerHTML = diretorias.map(function (d) { return '<option value="' + d + '">' + d + '</option>'; }).join('');
    if (diretorias.indexOf(diretoriaSelecionada) === -1) diretoriaSelecionada = diretorias[0];
    selDir.value = diretoriaSelecionada;
    selDir.onchange = function () { diretoriaSelecionada = this.value; render(); };
  }

  function init() {
    Papa.parse(CONFIG.csvUrl, {
      download: true,
      header: true,
      complete: function (results) {
        DATA = results.data.filter(function (r) { return r.Indicador; });
        document.getElementById('loading').style.display = 'none';
        document.getElementById('conteudo').style.display = 'block';
        document.getElementById('footerTimestamp').textContent = 'Atualizado em ' + new Date().toLocaleString('pt-BR');
        popularFiltros();
        render();
      },
      error: function () {
        document.getElementById('loading').style.display = 'none';
        const el = document.getElementById('errorState');
        el.style.display = 'block';
        el.textContent = 'Não foi possível carregar os dados da planilha. Verifique se o CSV ainda está publicado (Arquivo > Compartilhar > Publicar na Web).';
      }
    });
  }

  init();

})();
</script>
</body>
</html>
