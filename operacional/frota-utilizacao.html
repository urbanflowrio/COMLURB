<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utilização da Frota | HUB COMLURB</title>
  <link rel="stylesheet" href="../assets/css/hub-premium.css">
  <style>

    /* ── Faixa de resposta às 4 perguntas ── */
    .perguntas {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 14px;
    }
    .pq-card {
      background: var(--painel);
      border: 1px solid var(--linha);
      border-radius: 20px;
      padding: 20px 22px 18px;
    }
    .pq-eyebrow {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--silenciado);
      margin-bottom: 8px;
    }
    .pq-valor {
      font-size: 36px;
      font-weight: 950;
      line-height: 1;
      margin-bottom: 4px;
    }
    .pq-label {
      font-size: 12px;
      color: var(--silenciado);
      line-height: 1.4;
    }
    .pq-tendencia {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 700;
      margin-top: 6px;
    }
    .v-ok      { color: #4caf7d; }
    .v-alerta  { color: var(--amarelo); }
    .v-critico { color: var(--vermelho); }
    .v-neutro  { color: var(--silenciado); }

    /* borda semafórica */
    .borda-ok      { border-color: rgba(76,175,125,0.4); }
    .borda-alerta  { border-color: rgba(255,160,43,0.4); }
    .borda-critico { border-color: rgba(239,106,93,0.4); }

    /* ── Grid 2 colunas para painéis ── */
    .painel-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    /* ── Painel de barras por gerência ── */
    .ger-row {
      display: grid;
      grid-template-columns: 72px 1fr 50px;
      gap: 10px;
      align-items: center;
      margin-bottom: 9px;
      padding: 3px 4px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .ger-row:hover { background: rgba(91,155,213,0.06); }
    .ger-nome {
      font-size: 11px;
      font-weight: 700;
      color: var(--silenciado);
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ger-track { height: 11px; background: rgba(19,41,65,0.9); border-radius: 5px; overflow: hidden; }
    .ger-fill  { height: 100%; border-radius: 5px; transition: width 0.4s ease; }
    .ger-fill.ok      { background: linear-gradient(90deg,#2e7d52,#4caf7d); }
    .ger-fill.alerta  { background: linear-gradient(90deg,#b87a00,#ffa02b); }
    .ger-fill.critico { background: linear-gradient(90deg,#a83e36,#ef6a5d); }
    .ger-pct { font-size: 11px; font-weight: 800; text-align: right; white-space: nowrap; }
    .ger-pct.ok      { color: #4caf7d; }
    .ger-pct.alerta  { color: var(--amarelo); }
    .ger-pct.critico { color: var(--vermelho); }

    /* ── Nota sobre >100% ── */
    .nota-100 {
      font-size: 10px;
      color: var(--silenciado);
      padding: 8px 18px 12px;
      border-top: 1px solid rgba(41,72,102,0.4);
    }

    /* ── Destaques operacionais ── */
    .destaque-bloco {
      background: var(--painel);
      border: 1px solid var(--linha);
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .destaque-inner {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
    }
    .destaque-col {
      padding: 18px 22px 20px;
      border-right: 1px solid var(--linha);
    }
    .destaque-col:last-child { border-right: none; }
    .dest-eyebrow {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--silenciado);
      margin-bottom: 10px;
    }
    .dest-titulo {
      font-size: 13px;
      font-weight: 700;
      color: var(--texto);
      margin-bottom: 10px;
    }
    .dest-amp-row {
      display: flex;
      gap: 16px;
      margin-bottom: 10px;
    }
    .dest-amp-item .av { font-size: 20px; font-weight: 900; line-height: 1; }
    .dest-amp-item .al {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--silenciado); margin-top: 2px;
    }
    .dest-amp-item .ag { font-size: 11px; color: var(--silenciado); }
    .dest-sep { color: var(--linha); align-self: center; font-size: 18px; }
    .dest-narrativa {
      font-size: 11.5px;
      line-height: 1.65;
      color: #c7d8ee;
      padding-top: 10px;
      border-top: 1px solid rgba(41,72,102,0.5);
    }

    /* ── Toggle detalhe ── */
    .toggle-det {
      width: 100%; background: none; border: none;
      border-top: 1px solid var(--linha);
      color: var(--silenciado); font-size: 11px; font-weight: 600;
      letter-spacing: 0.05em; padding: 9px 18px;
      cursor: pointer; text-align: left; transition: 0.15s;
    }
    .toggle-det:hover { color: var(--texto); background: rgba(255,255,255,0.02); }
    .detail-wrap { display: none; border-top: 1px solid var(--linha); max-height: 200px; overflow-y: auto; }
    .detail-wrap.open { display: block; }

    /* ── Tabela detalhe ── */
    .det-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .det-table th {
      padding: 7px 16px; text-align: left; font-size: 10px; font-weight: 800;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--silenciado);
      border-bottom: 1px solid var(--linha); background: rgba(0,0,0,0.2);
      position: sticky; top: 0;
    }
    .det-table td { padding: 6px 16px; border-bottom: 1px solid rgba(41,72,102,0.3); }
    .det-table tr:last-child td { border-bottom: none; }
    .det-table td.r { text-align: right; font-variant-numeric: tabular-nums; }
    .det-table td.fw { font-weight: 700; text-align: right; }

    /* ── Evolução ── */
    .chart-tall { padding: 16px 20px 22px; height: 240px; }

    /* ── Misc ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--linha); border-radius: 3px; }
    .vazio { padding: 24px 18px; color: var(--silenciado); font-size: 12px; text-align: center; }
  </style>
</head>

<body>
<div class="app">

  <div id="header"></div>

  <!-- FILTROS -->
  <section class="filters">
    <div class="field">
      <label>Período</label>
      <select id="fPeriodo" onchange="applyFilters()">
        <option value="">Todos</option>
      </select>
    </div>
    <div class="field">
      <label>Superintendência</label>
      <select id="fSuper" onchange="applyFilters()">
        <option value="">Todas</option>
      </select>
    </div>
    <button class="actionBtn" onclick="clearAll()">Limpar filtros</button>
  </section>

  <!-- 4 PERGUNTAS EXECUTIVAS -->
  <div class="perguntas" id="perguntas">
    <div class="pq-card"><div class="loading">Carregando...</div></div>
    <div class="pq-card"><div class="loading">Carregando...</div></div>
    <div class="pq-card"><div class="loading">Carregando...</div></div>
    <div class="pq-card"><div class="loading">Carregando...</div></div>
  </div>

  <!-- PAINÉIS DE BARRAS: DOM + LP -->
  <div class="painel-row">
    <div class="panel">
      <div class="panelHead">
        <h2>Coleta Domiciliar — por gerência</h2>
        <div class="hint" id="avgDOM">—</div>
      </div>
      <div class="body" id="barsDOM"><div class="loading">Carregando...</div></div>
      <div class="nota-100" id="notaDOM"></div>
      <button class="toggle-det" onclick="toggleDetail('DOM')">▸ Detalhe por tipo de veículo</button>
      <div class="detail-wrap" id="tableDOM"></div>
    </div>

    <div class="panel">
      <div class="panelHead">
        <h2>Lixo Público — por gerência</h2>
        <div class="hint" id="avgLP">—</div>
      </div>
      <div class="body" id="barsLP"><div class="loading">Carregando...</div></div>
      <div class="nota-100" id="notaLP"></div>
      <button class="toggle-det" onclick="toggleDetail('LP')">▸ Detalhe por tipo de veículo</button>
      <div class="detail-wrap" id="tableLP"></div>
    </div>
  </div>

  <!-- PAINEL SELETIVA (full width — só DSU) -->
  <div class="panel" style="margin-bottom:14px">
    <div class="panelHead">
      <h2>Coleta Seletiva — por gerência</h2>
      <div class="hint" id="avgSEL">—</div>
    </div>
    <div class="body" id="barsSEL" style="display:grid;grid-template-columns:repeat(3,1fr);gap:0 32px">
      <div class="loading">Carregando...</div>
    </div>
    <div class="nota-100" id="notaSEL"></div>
    <button class="toggle-det" onclick="toggleDetail('SEL')">▸ Detalhe por tipo de veículo</button>
    <div class="detail-wrap" id="tableSEL"></div>
  </div>

  <!-- DESTAQUES OPERACIONAIS -->
  <div class="destaque-bloco">
    <div class="panelHead">
      <h2>Destaques Operacionais</h2>
      <div class="hint" id="destPeriodo">—</div>
    </div>
    <div class="destaque-inner" id="destaquesInner"></div>
  </div>

  <!-- EVOLUÇÃO MENSAL -->
  <div class="panel" style="margin-bottom:14px">
    <div class="panelHead">
      <h2>Evolução Mensal</h2>
      <div class="hint">% utilização média por serviço · 2026</div>
    </div>
    <div class="chart-tall">
      <canvas id="chartEvolucao"></canvas>
    </div>
  </div>

  <div id="footer"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="../assets/components/hub-utils.js"></script>
<script src="../assets/components/hub-cards.js"></script>
<script src="../assets/components/hub-charts.js"></script>
<script src="../assets/components/hub-filters.js"></script>
<script src="../assets/components/hub-layout.js"></script>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const CONFIG = {
  systemLabel: "OPERAÇÕES",
  title:       "Utilização da Frota",
  subtitle:    "Peso coletado vs. capacidade operacional por serviço e gerência · 2026",
  author:      "Greicy Moreira",
  version:     "1.0",
  urls: {
    DOM: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQck5g3cWZN-in8I9ogYmytl8X_IbDd4ENxJvIhDv7va2viE2GCh9GA5sxzJC9fqeSk2jS7uBGP571u/pub?gid=1898137343&single=true&output=csv",
    LP:  "https://docs.google.com/spreadsheets/d/e/2PACX-1vQck5g3cWZN-in8I9ogYmytl8X_IbDd4ENxJvIhDv7va2viE2GCh9GA5sxzJC9fqeSk2jS7uBGP571u/pub?gid=1599396593&single=true&output=csv",
    SEL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQck5g3cWZN-in8I9ogYmytl8X_IbDd4ENxJvIhDv7va2viE2GCh9GA5sxzJC9fqeSk2jS7uBGP571u/pub?gid=1210816191&single=true&output=csv"
  },
  nomes: { DOM: "Coleta Domiciliar", LP: "Lixo Público", SEL: "Coleta Seletiva" },
  ok: 90, alerta: 70
};

// ─── ESTADO ───────────────────────────────────────────────────────────────────
let RAW = { DOM:[], LP:[], SEL:[] };
let FILTERED = { DOM:[], LP:[], SEL:[] };
let allPeriodos = [];
let allSupers   = [];
let evolChart   = null;

// ─── UTILS ────────────────────────────────────────────────────────────────────
function pNum(s) {
  if (!s && s !== 0) return null;
  const v = parseFloat(String(s).replace(/"/g,"").replace(",","."));
  return isNaN(v) ? null : v;
}
function sem(v) {
  if (v === null) return "";
  return v >= CONFIG.ok ? "ok" : v >= CONFIG.alerta ? "alerta" : "critico";
}
function cor(cls) {
  return cls==="ok" ? "#4caf7d" : cls==="alerta" ? "var(--amarelo)" : cls==="critico" ? "var(--vermelho)" : "var(--silenciado)";
}
function avgArr(arr) {
  const v = arr.filter(x => x!==null && x<300);
  return v.length ? v.reduce((a,b)=>a+b,0)/v.length : null;
}
function avgRows(rows) { return avgArr(rows.map(r=>r.pct)); }
function orderP(p) {
  const mo={jan:1,fev:2,mar:3,abr:4,mai:5,jun:6,jul:7,ago:8,set:9,out:10,nov:11,dez:12};
  return (p.includes("26")?26:25)*100+(mo[p.split(".")[0].toLowerCase().trim()]||0);
}
function periodoAtual() {
  return document.getElementById("fPeriodo").value || allPeriodos[allPeriodos.length-1] || "";
}
function periodoAnterior(p) {
  const i = allPeriodos.indexOf(p);
  return i > 0 ? allPeriodos[i-1] : null;
}

// ─── LOAD CSV com mapeamento robusto de colunas ────────────────────────────────
async function loadBase(key) {
  const text = await fetch(CONFIG.urls[key]).then(r=>r.text());
  const parsed = Papa.parse(text, { header:true, skipEmptyLines:true });
  
  return parsed.data.map(r => {
    // normaliza chaves
    const keys = Object.keys(r);
    const find = (...candidates) => {
      for (const c of candidates) {
        const k = keys.find(k => k.trim().toLowerCase().replace(/[^a-z]/g,"") === c.toLowerCase().replace(/[^a-z]/g,""));
        if (k && r[k] !== undefined) return r[k];
      }
      return "";
    };

    const periodo  = find("Período","Periodo").trim();
    const sup      = find("Superintendencia","Superintendência").trim();
    const gerencia = find("Gerencia","Gerência").trim();
    const tipo     = find("Tipo de Veiculo","Tipo de Veículo").trim();
    const peso     = pNum(find("Peso Total (ton)","Peso Total ton"));
    const cap      = pNum(find("Capacidade Total (ton)","Capacidade Total ton"));
    const pct      = pNum(find("Capacidade Total 2 Viagens (%)","Capacidade Total 2 Viagens"));

    return { periodo, sup, gerencia, tipo, peso, cap, pct };
  }).filter(r => r.periodo && r.periodo.includes("26") && r.pct !== null);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  HUB.header.render("header", {
    systemLabel: CONFIG.systemLabel,
    title:       CONFIG.title,
    subtitle:    CONFIG.subtitle
  });

  const [dom, lp, sel] = await Promise.all([
    loadBase("DOM"), loadBase("LP"), loadBase("SEL")
  ]);

  RAW.DOM=dom; RAW.LP=lp; RAW.SEL=sel;

  const all = [...dom,...lp,...sel];
  allPeriodos = [...new Set(all.map(r=>r.periodo).filter(Boolean))].sort((a,b)=>orderP(a)-orderP(b));
  allSupers   = [...new Set(all.map(r=>r.sup).filter(Boolean))].sort();

  populateFilters();
  applyFilters();

  HUB.footer.render("footer", { author:CONFIG.author, version:CONFIG.version, showTimestamp:true });
}

// ─── FILTROS ──────────────────────────────────────────────────────────────────
function populateFilters() {
  const latest = allPeriodos[allPeriodos.length-1];
  document.getElementById("fPeriodo").innerHTML =
    '<option value="">Todos os meses</option>' +
    allPeriodos.map(p=>`<option value="${p}" ${p===latest?"selected":""}>${p}</option>`).join("");

  document.getElementById("fSuper").innerHTML =
    '<option value="">Todas</option>' +
    allSupers.map(s=>`<option value="${s}">${s}</option>`).join("");
}

function applyFilters() {
  const per = document.getElementById("fPeriodo").value;
  const sup = document.getElementById("fSuper").value;
  const f = arr => arr.filter(r=>(!per||r.periodo===per)&&(!sup||r.sup===sup));
  FILTERED.DOM=f(RAW.DOM); FILTERED.LP=f(RAW.LP); FILTERED.SEL=f(RAW.SEL);
  render();
}

function clearAll() {
  document.getElementById("fPeriodo").value="";
  document.getElementById("fSuper").value="";
  applyFilters();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  renderPerguntas();
  ["DOM","LP","SEL"].forEach(k=>{ renderBars(k); renderTable(k); });
  renderDestaques();
  renderChart();
}

// ── 4 perguntas executivas ────────────────────────────────────────────────────
function renderPerguntas() {
  const per  = periodoAtual();
  const prev = periodoAnterior(per);

  // pergunta 1: a frota está acima ou abaixo da capacidade?
  const avgDOM = avgRows(FILTERED.DOM);
  const avgLP  = avgRows(FILTERED.LP);
  const avgSEL = avgRows(FILTERED.SEL);
  const geral  = avgArr([avgDOM,avgLP,avgSEL].filter(v=>v!==null));
  const clsGeral = sem(geral);

  // pergunta 2: quantas gerências ociosas (<70%)?
  const todasGer = {};
  ["DOM","LP","SEL"].forEach(k=>{
    FILTERED[k].forEach(r=>{
      const g=r.gerencia||"N/D";
      if(!todasGer[g]) todasGer[g]=[];
      if(r.pct!==null&&r.pct<300) todasGer[g].push(r.pct);
    });
  });
  const gerAvg  = Object.entries(todasGer).map(([g,vs])=>({g,v:avgArr(vs)}));
  const ociosas = gerAvg.filter(x=>x.v!==null&&x.v<CONFIG.alerta).length;
  const total   = gerAvg.length;

  // pergunta 3: tendência (comparação mês anterior)
  let tendencia = null, tendClass = "v-neutro", tendSeta = "→";
  if (prev) {
    const fp = arr=>arr.filter(r=>r.periodo===prev);
    const aDOM = avgRows(fp(RAW.DOM));
    const aLP  = avgRows(fp(RAW.LP));
    const aSEL = avgRows(fp(RAW.SEL));
    const geralPrev = avgArr([aDOM,aLP,aSEL].filter(v=>v!==null));
    if (geral!==null && geralPrev!==null) {
      tendencia = geral - geralPrev;
      tendClass = tendencia > 0 ? "v-ok" : tendencia < 0 ? "v-critico" : "v-neutro";
      tendSeta  = tendencia > 0 ? "↑" : tendencia < 0 ? "↓" : "→";
    }
  }

  // pergunta 4: serviço com menor utilização
  const servicos = [
    {nome:"Dom.", v:avgDOM}, {nome:"L.P.", v:avgLP}, {nome:"Selet.", v:avgSEL}
  ].filter(s=>s.v!==null);
  const menor = servicos.length ? servicos.sort((a,b)=>a.v-b.v)[0] : null;

  document.getElementById("perguntas").innerHTML = `
    <div class="pq-card ${clsGeral?'borda-'+clsGeral:''}">
      <div class="pq-eyebrow">Frota acima ou abaixo da capacidade?</div>
      <div class="pq-valor ${clsGeral?'v-'+clsGeral:''}">${geral!==null?Math.round(geral)+"%":"—"}</div>
      <div class="pq-label">utilização média geral no período</div>
      <div class="pq-tendencia v-neutro">${geral!==null?(geral>=100?"Acima da capacidade nominal":geral>=CONFIG.ok?"Dentro do esperado":"Abaixo do referencial"):""}</div>
    </div>

    <div class="pq-card ${ociosas>0?'borda-critico':'borda-ok'}">
      <div class="pq-eyebrow">Gerências com ociosidade?</div>
      <div class="pq-valor ${ociosas>0?'v-critico':'v-ok'}">${ociosas}</div>
      <div class="pq-label">de ${total} gerências monitoradas com utilização abaixo de ${CONFIG.alerta}%</div>
    </div>

    <div class="pq-card ${tendencia!==null?(tendencia>=0?'borda-ok':'borda-critico'):''}">
      <div class="pq-eyebrow">Tendência vs. período anterior</div>
      <div class="pq-valor ${tendClass}">${tendencia!==null?(tendencia>0?"+":"")+tendencia.toFixed(1).replace(".",",")+" p.p.":"—"}</div>
      <div class="pq-label">variação em relação a ${prev||"período anterior"}</div>
      <div class="pq-tendencia ${tendClass}">${tendSeta} ${tendencia!==null?(Math.abs(tendencia)<0.5?"Estável":tendencia>0?"Melhora":"Queda"):""}</div>
    </div>

    <div class="pq-card ${menor?'borda-'+(sem(menor.v)):''}">
      <div class="pq-eyebrow">Serviço com menor utilização</div>
      <div class="pq-valor ${menor?'v-'+sem(menor.v):''}">${menor?Math.round(menor.v)+"%":"—"}</div>
      <div class="pq-label">${menor?menor.nome+" — menor índice entre os serviços monitorados":""}</div>
    </div>
  `;
}

// ── barras por gerência ───────────────────────────────────────────────────────
function renderBars(key) {
  const data   = FILTERED[key];
  const barsEl = document.getElementById("bars"+key);
  const avgEl  = document.getElementById("avg"+key);
  const notaEl = document.getElementById("nota"+key);

  if (!data.length) {
    barsEl.innerHTML='<div class="vazio">Sem dados para o filtro selecionado.</div>';
    avgEl.textContent="—"; notaEl.textContent="";
    return;
  }

  const grupos={};
  data.forEach(r=>{
    const g=r.gerencia||"N/D";
    if(!grupos[g]) grupos[g]=[];
    if(r.pct!==null&&r.pct<300) grupos[g].push(r.pct);
  });

  const rows=Object.entries(grupos)
    .map(([g,vs])=>({g,v:avgArr(vs)}))
    .filter(x=>x.v!==null)
    .sort((a,b)=>b.v-a.v);

  const overall=avgRows(data);
  const cls=sem(overall);
  avgEl.textContent=overall!==null?Math.round(overall)+"%":"—";
  avgEl.style.color=cor(cls);

  // conta gerências acima de 100%
  const acima100=rows.filter(x=>x.v>100).length;

  barsEl.innerHTML=rows.map(({g,v})=>{
    const c=sem(v);
    const w=Math.min(v,100).toFixed(1);
    const marcador=v>100?` <span style="font-size:9px;color:var(--silenciado)">▲</span>`:"";
    return `
      <div class="ger-row">
        <span class="ger-nome" title="${g}">${g}</span>
        <div class="ger-track"><div class="ger-fill ${c}" style="width:${w}%"></div></div>
        <span class="ger-pct ${c}">${Math.round(v)}%${marcador}</span>
      </div>`;
  }).join("");

  notaEl.textContent = acima100>0
    ? `▲ ${acima100} gerência${acima100>1?"s":""} com utilização acima de 100% — veículo realizou mais viagens que a capacidade nominal de referência.`
    : "";
}

// ── tabela detalhe por tipo ───────────────────────────────────────────────────
function renderTable(key) {
  const data=FILTERED[key];
  const el=document.getElementById("table"+key);
  if(!data.length){ el.innerHTML='<div class="vazio">Sem dados.</div>'; return; }

  const grupos={};
  data.forEach(r=>{
    const t=r.tipo||"N/D";
    if(!grupos[t]) grupos[t]={peso:0,cap:0,vals:[]};
    if(r.peso) grupos[t].peso+=r.peso;
    if(r.cap)  grupos[t].cap+=r.cap;
    if(r.pct!==null&&r.pct<300) grupos[t].vals.push(r.pct);
  });

  const rows=Object.entries(grupos)
    .map(([t,g])=>({t,peso:g.peso,cap:g.cap,pct:avgArr(g.vals)}))
    .sort((a,b)=>(b.pct||0)-(a.pct||0));

  el.innerHTML=`
    <table class="det-table">
      <thead><tr>
        <th>Tipo</th>
        <th style="text-align:right">Peso (t)</th>
        <th style="text-align:right">Cap. (t)</th>
        <th style="text-align:right">% Util.</th>
      </tr></thead>
      <tbody>${rows.map(r=>{
        const c=sem(r.pct);
        return `<tr>
          <td>${r.t}</td>
          <td class="r">${r.peso?r.peso.toLocaleString("pt-BR",{maximumFractionDigits:1}):"—"}</td>
          <td class="r">${r.cap?r.cap.toLocaleString("pt-BR",{maximumFractionDigits:1}):"—"}</td>
          <td class="fw" style="color:${cor(c)}">${r.pct!==null?Math.round(r.pct)+"%":"—"}</td>
        </tr>`;
      }).join("")}</tbody>
    </table>`;
}

// ── destaques operacionais ────────────────────────────────────────────────────
function renderDestaques() {
  const per=periodoAtual();
  document.getElementById("destPeriodo").textContent=per||"todos os períodos";

  const cols=["DOM","LP","SEL"].map(key=>{
    const data=FILTERED[key];
    const nome=CONFIG.nomes[key];
    if(!data.length) return `<div class="destaque-col"><div class="dest-eyebrow">${nome}</div><div class="vazio" style="padding:8px 0">Sem dados.</div></div>`;

    const grupos={};
    data.forEach(r=>{
      const g=r.gerencia||"N/D";
      if(!grupos[g]) grupos[g]=[];
      if(r.pct!==null&&r.pct<300) grupos[g].push(r.pct);
    });
    const rows=Object.entries(grupos).map(([g,vs])=>({g,v:avgArr(vs)})).filter(x=>x.v!==null).sort((a,b)=>b.v-a.v);
    if(!rows.length) return `<div class="destaque-col"><div class="dest-eyebrow">${nome}</div><div class="vazio">Sem dados.</div></div>`;

    const maior=rows[0];
    const menor=rows[rows.length-1];
    const amp=(maior.v-menor.v).toFixed(1).replace(".",",");
    const cMaior=sem(maior.v), cMenor=sem(menor.v);

    const narrativa=`${maior.g} registrou o maior índice de utilização da capacidade operacional em ${per}. `+
      `${menor.g} apresentou o menor índice entre as gerências monitoradas. `+
      `A diferença entre os extremos foi de ${amp} pontos percentuais, evidenciando comportamentos operacionais distintos entre os territórios atendidos.`;

    return `
      <div class="destaque-col">
        <div class="dest-eyebrow">Destaques Operacionais</div>
        <div class="dest-titulo">${nome}</div>
        <div class="dest-amp-row">
          <div class="dest-amp-item">
            <div class="av" style="color:${cor(cMaior)}">${Math.round(maior.v)}%</div>
            <div class="al">Maior</div>
            <div class="ag">${maior.g}</div>
          </div>
          <div class="dest-sep">·</div>
          <div class="dest-amp-item">
            <div class="av" style="color:${cor(cMenor)}">${Math.round(menor.v)}%</div>
            <div class="al">Menor</div>
            <div class="ag">${menor.g}</div>
          </div>
          <div class="dest-sep">·</div>
          <div class="dest-amp-item">
            <div class="av" style="color:var(--silenciado)">${amp} p.p.</div>
            <div class="al">Amplitude</div>
            <div class="ag">entre extremos</div>
          </div>
        </div>
        <div class="dest-narrativa">${narrativa}</div>
      </div>`;
  });

  document.getElementById("destaquesInner").innerHTML=cols.join("");
}

// ── evolução mensal ───────────────────────────────────────────────────────────
function renderChart() {
  const sup=document.getElementById("fSuper").value;
  function series(rawData) {
    const byP={};
    rawData.forEach(r=>{
      if(!r.periodo||r.pct===null||r.pct>=300) return;
      if(sup&&r.sup!==sup) return;
      if(!byP[r.periodo]) byP[r.periodo]=[];
      byP[r.periodo].push(r.pct);
    });
    return allPeriodos.map(p=>{ const v=byP[p]; return v&&v.length?Math.round(avgArr(v)):null; });
  }

  const ctx=document.getElementById("chartEvolucao").getContext("2d");
  if(evolChart) evolChart.destroy();
  evolChart=new Chart(ctx,{
    type:"line",
    data:{
      labels:allPeriodos,
      datasets:[
        {label:"Coleta Domiciliar",data:series(RAW.DOM),borderColor:"#5b9bd5",backgroundColor:"rgba(91,155,213,0.07)",borderWidth:2.5,pointRadius:4,pointHoverRadius:6,tension:0.35,spanGaps:true},
        {label:"Lixo Público",     data:series(RAW.LP), borderColor:"#e87535",backgroundColor:"rgba(232,117,53,0.07)",borderWidth:2.5,pointRadius:4,pointHoverRadius:6,tension:0.35,spanGaps:true},
        {label:"Coleta Seletiva",  data:series(RAW.SEL),borderColor:"#78aaa3",backgroundColor:"rgba(120,170,163,0.07)",borderWidth:2.5,pointRadius:4,pointHoverRadius:6,tension:0.35,spanGaps:true}
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:"index",intersect:false},
      plugins:{
        legend:{labels:{color:"#b8c9de",font:{size:11},boxWidth:12,padding:20}},
        tooltip:{
          backgroundColor:"rgba(6,17,31,0.97)",borderColor:"#294866",borderWidth:1,
          titleColor:"#f7f9ff",bodyColor:"#b8c9de",padding:12,
          callbacks:{label:c=>`  ${c.dataset.label}: ${c.parsed.y!==null?c.parsed.y+"%":"—"}`}
        }
      },
      scales:{
        x:{ticks:{color:"#b8c9de",font:{size:10}},grid:{color:"rgba(41,72,102,0.3)"}},
        y:{ticks:{color:"#b8c9de",font:{size:10},callback:v=>v+"%"},grid:{color:"rgba(41,72,102,0.3)"},min:0}
      }
    }
  });
}

function toggleDetail(key) {
  const wrap=document.getElementById("table"+key);
  const btn=wrap.previousElementSibling;
  const open=wrap.classList.toggle("open");
  btn.textContent=(open?"▾":"▸")+" Detalhe por tipo de veículo";
}

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
