<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utilização da Frota | HUB COMLURB</title>
  <link rel="stylesheet" href="../assets/css/hub-premium.css">

  <style>
    /* ── Scoreboard de serviços ── */
    .score-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }
    .score-card {
      background: var(--painel);
      border: 1px solid var(--linha);
      border-radius: 14px;
      padding: 18px 22px;
    }
    .score-card .sc-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--silenciado);
      margin-bottom: 6px;
    }
    .score-card .sc-value {
      font-size: 38px;
      font-weight: 800;
      line-height: 1;
    }
    .score-card .sc-sub {
      font-size: 11px;
      color: var(--silenciado);
      margin-top: 4px;
    }
    .sc-value.ok     { color: #4caf7d; }
    .sc-value.alerta { color: var(--amarelo); }
    .sc-value.critico{ color: var(--vermelho); }

    /* ── Barras semafóricas por gerência ── */
    .ger-bar-row {
      display: grid;
      grid-template-columns: 80px 1fr 50px;
      gap: 8px;
      align-items: center;
      margin-bottom: 9px;
    }
    .ger-name {
      font-size: 11px;
      color: var(--silenciado);
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ger-track {
      height: 10px;
      background: #132941;
      border-radius: 4px;
      overflow: hidden;
    }
    .ger-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.35s ease;
    }
    .ger-fill.ok      { background: linear-gradient(90deg,#2e7d52,#4caf7d); }
    .ger-fill.alerta  { background: linear-gradient(90deg,#b87a00,#ffa02b); }
    .ger-fill.critico { background: linear-gradient(90deg,#a83e36,#ef6a5d); }
    .ger-pct {
      font-size: 11px;
      font-weight: 700;
      text-align: right;
    }
    .ger-pct.ok      { color: #4caf7d; }
    .ger-pct.alerta  { color: var(--amarelo); }
    .ger-pct.critico { color: var(--vermelho); }

    /* ── Toggle detalhe ── */
    .toggle-detail {
      width: 100%;
      background: none;
      border: none;
      border-top: 1px solid var(--linha);
      color: var(--silenciado);
      font-size: 11px;
      padding: 8px 18px;
      cursor: pointer;
      text-align: left;
    }
    .toggle-detail:hover { color: var(--texto); background: rgba(255,255,255,0.02); }

    .detail-wrap {
      display: none;
      border-top: 1px solid var(--linha);
      max-height: 220px;
      overflow-y: auto;
    }
    .detail-wrap.open { display: block; }

    /* ── Tabela de detalhe ── */
    .det-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .det-table th {
      padding: 7px 14px;
      text-align: left;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--silenciado);
      border-bottom: 1px solid var(--linha);
      background: rgba(0,0,0,0.18);
      position: sticky; top: 0;
    }
    .det-table td {
      padding: 6px 14px;
      border-bottom: 1px solid rgba(41,72,102,0.35);
      color: var(--texto);
    }
    .det-table tr:last-child td { border-bottom: none; }
    .det-table td.r { text-align: right; font-variant-numeric: tabular-nums; }
    .det-table td.pct-td { text-align: right; font-weight: 700; }

    /* ── Evolução chart ── */
    .chart-wrap-tall { padding: 16px 18px 20px; height: 230px; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--linha); border-radius: 3px; }
  </style>
</head>

<body>
<div class="app">

  <!-- HEADER -->
  <div id="header"></div>

  <!-- FILTROS -->
  <section class="filters">
    <div class="field">
      <label>Período</label>
      <select id="fPeriodo" onchange="applyFilters()">
        <option value="">Todos</option>
      </select>
    </div>
    <div class="field">
      <label>Superintendência</label>
      <select id="fSuper" onchange="applyFilters()">
        <option value="">Todas</option>
      </select>
    </div>
    <button class="actionBtn" onclick="clearAll()">Limpar</button>
  </section>

  <!-- SCOREBOARD -->
  <div class="score-strip">
    <div class="score-card">
      <div class="sc-label">Coleta Domiciliar</div>
      <div class="sc-value" id="scDOM">—</div>
      <div class="sc-sub" id="scDOM-sub">% utilização média</div>
    </div>
    <div class="score-card">
      <div class="sc-label">Lixo Público</div>
      <div class="sc-value" id="scLP">—</div>
      <div class="sc-sub" id="scLP-sub">% utilização média</div>
    </div>
    <div class="score-card">
      <div class="sc-label">Coleta Seletiva</div>
      <div class="sc-value" id="scSEL">—</div>
      <div class="sc-sub" id="scSEL-sub">% utilização média</div>
    </div>
  </div>

  <!-- GRID DE PAINÉIS -->
  <div class="grid">

    <!-- DOMICILIAR -->
    <div class="panel">
      <div class="panelHead">
        <h2>Coleta Domiciliar</h2>
        <div class="hint" id="avgDOM">—</div>
      </div>
      <div class="body" id="barsDOM">
        <div class="loading">Carregando dados...</div>
      </div>
      <button class="toggle-detail" onclick="toggleDetail('DOM')">▸ Detalhe por tipo de veículo</button>
      <div class="detail-wrap" id="tableDOM"></div>
    </div>

    <!-- LIXO PÚBLICO -->
    <div class="panel">
      <div class="panelHead">
        <h2>Lixo Público</h2>
        <div class="hint" id="avgLP">—</div>
      </div>
      <div class="body" id="barsLP">
        <div class="loading">Carregando dados...</div>
      </div>
      <button class="toggle-detail" onclick="toggleDetail('LP')">▸ Detalhe por tipo de veículo</button>
      <div class="detail-wrap" id="tableLP"></div>
    </div>

    <!-- SELETIVA -->
    <div class="panel">
      <div class="panelHead">
        <h2>Coleta Seletiva</h2>
        <div class="hint" id="avgSEL">—</div>
      </div>
      <div class="body" id="barsSEL">
        <div class="loading">Carregando dados...</div>
      </div>
      <button class="toggle-detail" onclick="toggleDetail('SEL')">▸ Detalhe por tipo de veículo</button>
      <div class="detail-wrap" id="tableSEL"></div>
    </div>

  </div><!-- /grid -->

  <!-- EVOLUÇÃO MENSAL -->
  <div class="panel" style="margin-top:16px">
    <div class="panelHead">
      <h2>Evolução Mensal — % Utilização Média</h2>
      <div class="hint">2026 · por serviço</div>
    </div>
    <div class="chart-wrap-tall">
      <canvas id="chartEvolucao"></canvas>
    </div>
  </div>

  <!-- FOOTER -->
  <div id="footer"></div>

</div><!-- /app -->

<!-- DEPENDÊNCIAS -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<!-- COMPONENTES HUB -->
<script src="../assets/components/hub-utils.js"></script>
<script src="../assets/components/hub-cards.js"></script>
<script src="../assets/components/hub-charts.js"></script>
<script src="../assets/components/hub-filters.js"></script>
<script src="../assets/components/hub-layout.js"></script>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const CONFIG = {
  systemLabel: "OPERAÇÕES",
  title:       "Utilização da Frota",
  subtitle:    "Peso coletado vs. capacidade por serviço e gerência · 2026",
  author:      "Greicy Moreira",
  version:     "1.0",
  urls: {
    DOM: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQck5g3cWZN-in8I9ogYmytl8X_IbDd4ENxJvIhDv7va2viE2GCh9GA5sxzJC9fqeSk2jS7uBGP571u/pub?gid=1898137343&single=true&output=csv",
    LP:  "https://docs.google.com/spreadsheets/d/e/2PACX-1vQck5g3cWZN-in8I9ogYmytl8X_IbDd4ENxJvIhDv7va2viE2GCh9GA5sxzJC9fqeSk2jS7uBGP571u/pub?gid=1599396593&single=true&output=csv",
    SEL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQck5g3cWZN-in8I9ogYmytl8X_IbDd4ENxJvIhDv7va2viE2GCh9GA5sxzJC9fqeSk2jS7uBGP571u/pub?gid=1210816191&single=true&output=csv"
  },
  thresholds: { ok: 90, alerta: 70 }
};

// ─── ESTADO ───────────────────────────────────────────────────────────────────
let RAW      = { DOM: [], LP: [], SEL: [] };
let FILTERED = { DOM: [], LP: [], SEL: [] };
let allPeriodos = [];
let allSupers   = [];
let evolChart   = null;

// ─── UTILS ────────────────────────────────────────────────────────────────────
function parseNum(s) {
  if (!s) return null;
  const v = parseFloat(String(s).replace(/"/g,"").replace(",","."));
  return isNaN(v) ? null : v;
}

function semaforo(v) {
  if (v === null) return "";
  if (v >= CONFIG.thresholds.ok) return "ok";
  if (v >= CONFIG.thresholds.alerta) return "alerta";
  return "critico";
}

function avgPct(rows) {
  const vals = rows.map(r => r.pct).filter(v => v !== null && v < 300);
  if (!vals.length) return null;
  return vals.reduce((a,b) => a+b, 0) / vals.length;
}

function orderPeriodo(p) {
  const mo = {jan:1,fev:2,mar:3,abr:4,mai:5,jun:6,jul:7,ago:8,set:9,out:10,nov:11,dez:12};
  const m = p.split(".")[0].toLowerCase().trim();
  const y = p.includes("26") ? 26 : p.includes("25") ? 25 : 24;
  return y * 100 + (mo[m] || 0);
}

// ─── LOAD ─────────────────────────────────────────────────────────────────────
async function loadBase(key) {
  const rows = await HUB.data.loadCSV(CONFIG.urls[key], { name: key });
  return rows
    .map(r => {
      const periodo  = HUB.pick(r, ["Período","Periodo"]);
      const sup      = HUB.pick(r, ["Superintendencia","Superintendência"]);
      const gerencia = HUB.pick(r, ["Gerencia","Gerência"]);
      const tipo     = HUB.pick(r, ["Tipo de Veiculo","Tipo de Veículo"]);
      const peso     = parseNum(HUB.pick(r, ["Peso Total (ton)"]));
      const cap      = parseNum(HUB.pick(r, ["Capacidade Total (ton)"]));
      const pct      = parseNum(HUB.pick(r, ["Capacidade Total 2 Viagens (%)"]));
      return { periodo, sup, gerencia, tipo, peso, cap, pct };
    })
    .filter(r => r.periodo && r.periodo.includes("26") && r.pct !== null);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  HUB.header.render("header", {
    systemLabel: CONFIG.systemLabel,
    title:       CONFIG.title,
    subtitle:    CONFIG.subtitle
  });

  HUB.loading.showMultiple(["barsDOM","barsLP","barsSEL"]);

  const [dom, lp, sel] = await Promise.all([
    loadBase("DOM"), loadBase("LP"), loadBase("SEL")
  ]);

  RAW.DOM = dom; RAW.LP = lp; RAW.SEL = sel;

  const all = [...dom, ...lp, ...sel];
  allPeriodos = [...new Set(all.map(r => r.periodo).filter(Boolean))]
    .sort((a,b) => orderPeriodo(a) - orderPeriodo(b));
  allSupers = [...new Set(all.map(r => r.sup).filter(Boolean))].sort();

  populateFilters();
  applyFilters();

  HUB.footer.render("footer", {
    author:  CONFIG.author,
    version: CONFIG.version,
    showTimestamp: true
  });
}

// ─── FILTROS ──────────────────────────────────────────────────────────────────
function populateFilters() {
  const latest = allPeriodos[allPeriodos.length - 1];

  const selPer = document.getElementById("fPeriodo");
  selPer.innerHTML = '<option value="">Todos os meses</option>' +
    allPeriodos.map(p =>
      `<option value="${p}" ${p === latest ? "selected" : ""}>${p}</option>`
    ).join("");

  const selSup = document.getElementById("fSuper");
  selSup.innerHTML = '<option value="">Todas</option>' +
    allSupers.map(s => `<option value="${s}">${s}</option>`).join("");
}

function applyFilters() {
  const per = document.getElementById("fPeriodo").value;
  const sup = document.getElementById("fSuper").value;

  function filter(arr) {
    return arr.filter(r =>
      (!per || r.periodo === per) &&
      (!sup || r.sup === sup)
    );
  }

  FILTERED.DOM = filter(RAW.DOM);
  FILTERED.LP  = filter(RAW.LP);
  FILTERED.SEL = filter(RAW.SEL);

  render();
}

function clearAll() {
  document.getElementById("fPeriodo").value = "";
  document.getElementById("fSuper").value   = "";
  applyFilters();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  renderScoreboard();
  renderBars("DOM");
  renderBars("LP");
  renderBars("SEL");
  renderTables();
  renderChart();
}

function renderScoreboard() {
  [["DOM","scDOM"],["LP","scLP"],["SEL","scSEL"]].forEach(([key,id]) => {
    const a = avgPct(FILTERED[key]);
    const el = document.getElementById(id);
    if (a === null) {
      el.textContent = "—";
      el.className = "sc-value";
    } else {
      el.textContent = Math.round(a) + "%";
      el.className = "sc-value " + semaforo(a);
    }
    document.getElementById(id + "-sub").textContent =
      FILTERED[key].length + " registros · % utilização média";
  });
}

function renderBars(key) {
  const data  = FILTERED[key];
  const barsEl = document.getElementById("bars" + key);
  const avgEl  = document.getElementById("avg"  + key);

  if (!data.length) {
    barsEl.innerHTML = '<div class="empty">Sem dados para o filtro selecionado.</div>';
    avgEl.textContent = "—";
    return;
  }

  // Agrupa por gerência
  const groups = {};
  data.forEach(r => {
    const g = r.gerencia || "N/D";
    if (!groups[g]) groups[g] = [];
    if (r.pct !== null && r.pct < 300) groups[g].push(r.pct);
  });

  const rows = Object.entries(groups)
    .map(([g, vals]) => ({ g, v: vals.reduce((a,b)=>a+b,0)/vals.length }))
    .sort((a,b) => b.v - a.v);

  const overall = avgPct(data);
  const cls = semaforo(overall);
  avgEl.textContent = overall !== null ? Math.round(overall) + "%" : "—";
  avgEl.style.color = cls === "ok" ? "#4caf7d" : cls === "alerta" ? "var(--amarelo)" : cls === "critico" ? "var(--vermelho)" : "";

  barsEl.innerHTML = rows.map(({g, v}) => {
    const c = semaforo(v);
    const w = Math.min(v, 100).toFixed(1);
    return `
      <div class="ger-bar-row">
        <span class="ger-name" title="${g}">${g}</span>
        <div class="ger-track">
          <div class="ger-fill ${c}" style="width:${w}%"></div>
        </div>
        <span class="ger-pct ${c}">${Math.round(v)}%</span>
      </div>`;
  }).join("");
}

function renderTables() {
  ["DOM","LP","SEL"].forEach(key => {
    const data = FILTERED[key];
    const el   = document.getElementById("table" + key);

    if (!data.length) {
      el.innerHTML = '<div class="empty" style="padding:12px 16px">Sem dados.</div>';
      return;
    }

    const groups = {};
    data.forEach(r => {
      const t = r.tipo || "N/D";
      if (!groups[t]) groups[t] = { peso: 0, cap: 0, vals: [] };
      if (r.peso) groups[t].peso += r.peso;
      if (r.cap)  groups[t].cap  += r.cap;
      if (r.pct !== null && r.pct < 300) groups[t].vals.push(r.pct);
    });

    const rows = Object.entries(groups)
      .map(([t, g]) => ({
        t,
        peso: g.peso,
        cap:  g.cap,
        pct:  g.vals.length ? g.vals.reduce((a,b)=>a+b,0)/g.vals.length : null
      }))
      .sort((a,b) => (b.pct||0) - (a.pct||0));

    el.innerHTML = `
      <table class="det-table">
        <thead>
          <tr>
            <th>Tipo</th>
            <th style="text-align:right">Peso (t)</th>
            <th style="text-align:right">Cap. (t)</th>
            <th style="text-align:right">% Util.</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => {
            const c = semaforo(r.pct);
            const cor = c === "ok" ? "#4caf7d" : c === "alerta" ? "var(--amarelo)" : c === "critico" ? "var(--vermelho)" : "var(--silenciado)";
            return `<tr>
              <td>${r.t}</td>
              <td class="r">${r.peso ? r.peso.toLocaleString("pt-BR",{maximumFractionDigits:1}) : "—"}</td>
              <td class="r">${r.cap  ? r.cap.toLocaleString ("pt-BR",{maximumFractionDigits:1}) : "—"}</td>
              <td class="pct-td" style="color:${cor}">${r.pct !== null ? Math.round(r.pct)+"%" : "—"}</td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>`;
  });
}

function renderChart() {
  const sup = document.getElementById("fSuper").value;

  function buildSeries(rawData) {
    const byP = {};
    rawData.forEach(r => {
      if (!r.periodo || r.pct === null || r.pct >= 300) return;
      if (sup && r.sup !== sup) return;
      if (!byP[r.periodo]) byP[r.periodo] = [];
      byP[r.periodo].push(r.pct);
    });
    return byP;
  }

  function vals(byP) {
    return allPeriodos.map(p => {
      const v = byP[p];
      return v && v.length ? Math.round(v.reduce((a,b)=>a+b,0)/v.length) : null;
    });
  }

  const domS = vals(buildSeries(RAW.DOM));
  const lpS  = vals(buildSeries(RAW.LP));
  const selS = vals(buildSeries(RAW.SEL));

  const ctx = document.getElementById("chartEvolucao").getContext("2d");
  if (evolChart) evolChart.destroy();

  evolChart = new Chart(ctx, {
    type: "line",
    data: {
      labels: allPeriodos,
      datasets: [
        { label:"Coleta Domiciliar", data:domS, borderColor:"#5b9bd5", backgroundColor:"rgba(91,155,213,0.08)", borderWidth:2, pointRadius:4, tension:0.35, spanGaps:true },
        { label:"Lixo Público",      data:lpS,  borderColor:"#e87535", backgroundColor:"rgba(232,117,53,0.08)",  borderWidth:2, pointRadius:4, tension:0.35, spanGaps:true },
        { label:"Coleta Seletiva",   data:selS, borderColor:"#78aaa3", backgroundColor:"rgba(120,170,163,0.08)", borderWidth:2, pointRadius:4, tension:0.35, spanGaps:true }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode:"index", intersect:false },
      plugins: {
        legend: { labels:{ color:"#b8c9de", font:{size:11}, boxWidth:12, padding:16 } },
        tooltip: {
          backgroundColor:"rgba(13,31,54,0.96)",
          borderColor:"#294866", borderWidth:1,
          titleColor:"#f7f9ff", bodyColor:"#b8c9de",
          callbacks: { label: c => ` ${c.dataset.label}: ${c.parsed.y !== null ? c.parsed.y+"%" : "—"}` }
        }
      },
      scales: {
        x: { ticks:{color:"#b8c9de",font:{size:10}}, grid:{color:"rgba(41,72,102,0.35)"} },
        y: { ticks:{color:"#b8c9de",font:{size:10},callback:v=>v+"%"}, grid:{color:"rgba(41,72,102,0.35)"}, min:0 }
      }
    }
  });
}

// ─── TOGGLE DETALHE ───────────────────────────────────────────────────────────
function toggleDetail(key) {
  const wrap = document.getElementById("table" + key);
  const btn  = wrap.previousElementSibling;
  const open = wrap.classList.toggle("open");
  btn.textContent = (open ? "▾" : "▸") + " Detalhe por tipo de veículo";
}

// ─── START ────────────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", init);
</script>

</body>
</html>
