<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operações | HUB COMLURB</title>
  <link rel="stylesheet" href="../assets/css/hub-premium.css">
  <style>
    .nav-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }
    .nav-card {
      background: var(--painel);
      border: 1px solid var(--linha);
      border-radius: 14px;
      padding: 24px;
      text-decoration: none;
      color: var(--texto);
      transition: 0.15s;
      display: block;
    }
    .nav-card:hover { border-color: var(--azul2); background: var(--painel2); }
    .nav-card .nc-label { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--silenciado); margin-bottom: 8px; }
    .nav-card .nc-title { font-size: 18px; font-weight: 700; }
    .nav-card .nc-desc  { font-size: 12px; color: var(--silenciado); margin-top: 6px; }
  </style>
</head>
<body>
<div class="app">
  <div id="header"></div>
  <div class="nav-grid">
    <a class="nav-card" href="frota-utilizacao.html">
      <div class="nc-label">Frota</div>
      <div class="nc-title">Utilização da Frota</div>
      <div class="nc-desc">Peso coletado vs. capacidade por serviço e gerência · 2026</div>
    </a>
  </div>
  <div id="footer"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="../assets/components/hub-utils.js"></script>
<script src="../assets/components/hub-layout.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    HUB.header.render("header", { systemLabel: "HUB COMLURB", title: "Operações", subtitle: "Painéis operacionais" });
    HUB.footer.render("footer", { author: "Greicy Moreira", version: "1.0", showTimestamp: false });
  });
</script>
</body>
</html>
